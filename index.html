<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Yummy's Donut Palace — Fresh Donuts in Warrensburg, MO</title>
  
  <meta name="description" content="Yummy's Donut Palace — Fresh handcrafted donuts, breakfast sandwiches, boba & drinks in Warrensburg, MO. Open Tue–Sun 6AM–1PM."/>
  <meta name="keywords" content="donuts, donut shop, Warrensburg MO, breakfast, boba, fresh donuts"/>
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍩</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --pink:#F9A8C9;--pink-dark:#E8579A;--pink-deep:#C2185B;
      --yellow:#FFD966;--yellow-dark:#F4B400;
      --brown:#4A2C0A;--brown-mid:#7B4C1E;
      --cream:#FFF8F0;--cream2:#FEF0E3;--white:#FFFFFF;
      --text:#2D1B09;--text-mid:#6B3F1A;--text-light:#A06030;
    }
    html{scroll-behavior:smooth;overflow-x:hidden}
    body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--text);overflow-x:hidden}
    
    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(255,248,240,0.96);backdrop-filter:blur(10px);border-bottom:2px dashed rgba(249,168,201,0.5);padding:0.9rem 2rem;display:flex;align-items:center;justify-content:space-between}
    .nav-brand{display:flex;align-items:center;gap:0.6rem;text-decoration:none}
    .nav-donut{font-size:1.8rem;animation:spin 6s linear infinite}
    .nav-name{font-family:'Fredoka One',cursive;font-size:1.4rem;color:var(--pink-deep)}
    .nav-name span{color:var(--yellow-dark)}
    .nav-links{display:flex;gap:1.5rem;list-style:none}
    .nav-links a{text-decoration:none;color:var(--text-mid);font-weight:700;font-size:0.9rem;transition:color 0.2s}
    .nav-links a:hover{color:var(--pink-deep)}
    .nav-call{display:flex;align-items:center;gap:0.4rem;background:var(--yellow-dark);color:var(--brown);padding:0.5rem 1.1rem;border-radius:30px;font-weight:800;font-size:0.82rem;text-decoration:none;transition:background 0.2s}
    .nav-call:hover{background:var(--yellow)}
    .nav-order{background:var(--pink-deep);color:#fff;padding:0.55rem 1.4rem;border-radius:30px;font-weight:800;font-size:0.85rem;text-decoration:none;transition:background 0.2s,transform 0.15s;display:inline-block}
    .nav-order:hover{background:var(--brown-mid);transform:scale(1.04)}
    
    /* HERO */
    #hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:7rem 2rem 4rem;background:radial-gradient(circle at 15% 20%,rgba(249,168,201,.35) 0%,transparent 40%),radial-gradient(circle at 85% 80%,rgba(255,217,102,.3) 0%,transparent 40%),radial-gradient(circle at 80% 15%,rgba(94,200,242,.2) 0%,transparent 30%),var(--cream);position:relative;overflow:hidden}
    .sprinkles{position:absolute;inset:0;pointer-events:none}
    .sprinkle{position:absolute;width:6px;height:20px;border-radius:3px;animation:fall linear infinite;opacity:.7}
    .hero-inner{position:relative;z-index:2}
    .hero-badge{display:inline-flex;align-items:center;gap:.5rem;background:rgba(255,217,102,.3);border:2px solid var(--yellow-dark);color:var(--brown-mid);font-size:.8rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:.4rem 1.2rem;border-radius:30px;margin-bottom:1.5rem;animation:fadeUp .6s ease both}
    .hero-title{font-family:'Fredoka One',cursive;font-size:clamp(3.5rem,9vw,7.5rem);line-height:1;color:var(--brown);margin-bottom:.5rem;animation:fadeUp .7s ease .1s both}
    .hero-title .pop{color:var(--pink-deep)}
    .hero-title .pop2{color:var(--yellow-dark)}
    .hero-tagline{font-size:clamp(1rem,2.5vw,1.35rem);color:var(--text-mid);font-weight:600;margin-bottom:.5rem;animation:fadeUp .7s ease .15s both}
    .hero-sub{font-size:1rem;color:var(--text-light);font-weight:400;max-width:500px;margin:0 auto 1.5rem;animation:fadeUp .7s ease .2s both}
    .hero-call{display:inline-flex;align-items:center;gap:.5rem;background:var(--yellow-dark);color:var(--brown);font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;padding:.85rem 2rem;border-radius:40px;text-decoration:none;margin-bottom:1.25rem;transition:background .2s,transform .15s;animation:fadeUp .7s ease .22s both}
    .hero-call:hover{background:var(--yellow);transform:translateY(-2px)}
    .hero-ctas{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;animation:fadeUp .7s ease .3s both}
    .btn-pink{background:var(--pink-deep);color:#fff;border:none;padding:1rem 2.2rem;border-radius:40px;font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;text-decoration:none;cursor:pointer;transition:transform .15s,background .2s;display:inline-block}
    .btn-pink:hover{background:var(--brown-mid);transform:translateY(-3px)}
    .btn-ghost{background:transparent;color:var(--brown);border:2.5px solid var(--pink);padding:1rem 2.2rem;border-radius:40px;font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;text-decoration:none;cursor:pointer;transition:transform .15s,border-color .2s,color .2s;display:inline-block}
    .btn-ghost:hover{border-color:var(--pink-deep);color:var(--pink-deep);transform:translateY(-3px)}
    .hero-scroll{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.3rem;color:var(--text-light);font-size:.75rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;animation:bounce2 2s ease-in-out infinite}
    .hero-scroll::after{content:'↓';font-size:1.2rem}
    
    /* STATS RIBBON */
    .stats-ribbon{background:var(--pink-deep);padding:1.5rem 2rem;display:flex;justify-content:center;gap:4rem;flex-wrap:wrap}
    .stat{text-align:center}
    .stat-n{font-family:'Fredoka One',cursive;font-size:2.4rem;color:var(--yellow);display:block}
    .stat-l{font-size:.78rem;color:rgba(255,255,255,.8);font-weight:700;letter-spacing:.1em;text-transform:uppercase}
    
    /* SECTIONS */
    section{padding:5.5rem 2rem}
    .container{max-width:1100px;margin:0 auto}
    .section-eyebrow{font-size:.78rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--pink-dark);margin-bottom:.6rem;display:block}
    .section-title{font-family:'Fredoka One',cursive;font-size:clamp(2rem,4vw,3rem);color:var(--brown);line-height:1.15;margin-bottom:.8rem}
    .section-lead{color:var(--text-mid);font-size:1rem;font-weight:400;max-width:560px;margin-bottom:2.5rem}
    
    /* MONTHLY SPECIAL */
    #monthly-special{background:var(--brown)}
    .special-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center}
    .special-badge{display:inline-block;background:var(--yellow-dark);color:var(--brown);font-size:.75rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;padding:.35rem 1rem;border-radius:20px;margin-bottom:1rem}
    .special-title{font-family:'Fredoka One',cursive;font-size:clamp(2rem,4vw,3rem);color:var(--yellow);line-height:1.15;margin-bottom:.75rem}
    .special-desc{color:rgba(253,246,236,.8);font-size:1rem;margin-bottom:1.5rem;line-height:1.7}
    .special-price{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--pink);margin-bottom:1.5rem}
    .special-visual{border-radius:24px;border:2px dashed rgba(249,168,201,.3);aspect-ratio:1;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.06);font-size:7rem}
    .special-visual img{width:100%;height:100%;object-fit:cover;display:block;border-radius:22px}
    .btn-catering{display:inline-flex;align-items:center;gap:.5rem;background:var(--yellow-dark);color:var(--brown);padding:1rem 2.2rem;border-radius:40px;font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;text-decoration:none;transition:background .2s,transform .15s}
    .btn-catering:hover{background:var(--yellow);transform:translateY(-2px)}
    
    /* MENU */
    #menu{background:var(--cream2)}
    .menu-tabs{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:2.5rem}
    .tab{padding:.5rem 1.3rem;border-radius:30px;border:2px solid var(--pink);background:transparent;color:var(--brown-mid);font-family:'Nunito',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .2s}
    .tab.active,.tab:hover{background:var(--pink-deep);border-color:var(--pink-deep);color:#fff}
    .menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.25rem}
    .menu-section{display:none}
    .menu-section.active{display:grid}
    .menu-card{background:var(--white);border-radius:20px;border:2px solid rgba(249,168,201,.3);padding:1.5rem;transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column;gap:.5rem}
    .menu-card:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(194,24,91,.12)}
    .menu-emoji{font-size:2.5rem;margin-bottom:.3rem}
    .menu-name{font-weight:800;font-size:1.05rem;color:var(--brown)}
    .menu-desc{font-size:.88rem;color:var(--text-light);line-height:1.5;flex:1}
    .menu-price{font-family:'Fredoka One',cursive;font-size:1.2rem;color:var(--pink-deep);margin-top:.5rem}
    .menu-badge{display:inline-block;background:rgba(255,217,102,.3);border:1px solid var(--yellow-dark);color:var(--brown-mid);font-size:.7rem;font-weight:800;letter-spacing:.08em;padding:.2rem .6rem;border-radius:20px;text-transform:uppercase}
    
    /* WHY US */
    #why-us{background:var(--white)}
    .why-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1.5rem;margin-top:1rem}
    .why-card{background:var(--cream2);border-radius:20px;padding:1.75rem 1.5rem;border:1.5px solid rgba(249,168,201,.25);text-align:center;transition:transform .2s,box-shadow .2s}
    .why-card:hover{transform:translateY(-4px);box-shadow:0 10px 30px rgba(194,24,91,.1)}
    .why-icon{font-size:2.5rem;margin-bottom:.75rem;display:block}
    .why-title{font-weight:800;font-size:1rem;color:var(--brown);margin-bottom:.4rem}
    .why-text{font-size:.85rem;color:var(--text-light);line-height:1.55}
    
    /* ABOUT */
    #about{background:var(--cream2)}
    .about-grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center}
    .about-visual{background:radial-gradient(circle at 30% 40%,rgba(249,168,201,.4),transparent 60%),radial-gradient(circle at 75% 70%,rgba(255,217,102,.3),transparent 50%),var(--cream2);border-radius:24px;border:2px dashed rgba(249,168,201,.6);aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:8rem;flex-direction:column;gap:.5rem}
    .about-big-emoji{animation:wobble 3s ease-in-out infinite}
    .about-pills{display:flex;flex-direction:column;gap:1rem;margin-top:1.5rem}
    .about-pill{background:var(--white);border-radius:16px;padding:1rem 1.25rem;border:1.5px solid rgba(249,168,201,.3);display:flex;align-items:flex-start;gap:1rem}
    .pill-icon{font-size:1.6rem;flex-shrink:0}
    .pill-title{font-weight:800;font-size:.95rem;color:var(--brown);margin-bottom:.15rem}
    .pill-text{font-size:.85rem;color:var(--text-light)}
    
    /* CATERING */
    #catering{background:var(--pink-deep)}
    .catering-inner{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center}
    .catering-text .section-eyebrow{color:rgba(255,255,255,.65)}
    .catering-text .section-title{color:var(--yellow)}
    .catering-text .section-lead{color:rgba(255,255,255,.85);max-width:480px}
    .catering-perks{display:flex;flex-direction:column;gap:.75rem;margin-bottom:2rem}
    .catering-perk{display:flex;align-items:center;gap:.75rem;color:rgba(255,255,255,.9);font-size:.95rem;font-weight:600}
    .catering-perk-icon{font-size:1.3rem;flex-shrink:0}
    .catering-visual{background:rgba(255,255,255,.08);border-radius:24px;border:2px dashed rgba(255,255,255,.2);padding:2rem;display:flex;flex-direction:column;gap:1rem}
    .catering-stat{background:rgba(255,255,255,.1);border-radius:16px;padding:1.1rem 1.4rem;display:flex;align-items:center;gap:1rem}
    .catering-stat-n{font-family:'Fredoka One',cursive;font-size:1.8rem;color:var(--yellow);flex-shrink:0}
    .catering-stat-l{font-size:.85rem;color:rgba(255,255,255,.8);font-weight:600}
    
    /* REVIEWS */
    #reviews{background:var(--cream2)}
    .reviews-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.25rem}
    .review-card{background:var(--white);border-radius:20px;padding:1.5rem;border:2px solid rgba(249,168,201,.25);transition:transform .2s}
    .review-card:hover{transform:translateY(-3px)}
    .stars{color:var(--yellow-dark);font-size:1rem;margin-bottom:.75rem}
    .review-text{font-size:.92rem;color:var(--text-mid);line-height:1.65;margin-bottom:1rem;font-style:italic}
    .review-author{font-weight:800;font-size:.85rem;color:var(--brown)}
    .review-source{font-size:.78rem;color:var(--text-light)}
    .rating-highlight{background:var(--pink-deep);border-radius:20px;padding:2.5rem;text-align:center;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem}
    .rating-big{font-family:'Fredoka One',cursive;font-size:5rem;color:var(--yellow);line-height:1}
    .rating-stars{font-size:1.5rem;color:var(--yellow)}
    .rating-label{font-size:.85rem;font-weight:700;opacity:.85;letter-spacing:.08em;text-transform:uppercase}
    .google-badge{display:inline-flex;align-items:center;gap:.5rem;margin-top:.75rem;background:rgba(255,255,255,.15);border-radius:20px;padding:.4rem 1rem;font-size:.78rem;font-weight:700;color:rgba(255,255,255,.9);text-decoration:none;border:1px solid rgba(255,255,255,.2);transition:background .2s}
    .google-badge:hover{background:rgba(255,255,255,.25)}
    
    /* NEWSLETTER */
    #newsletter{background:var(--cream2)}
    .newsletter-inner{max-width:600px;margin:0 auto;text-align:center}
    .newsletter-inner .section-title{margin-bottom:.5rem}
    .newsletter-inner .section-lead{margin:0 auto 2rem}
    .newsletter-form{display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center}
    .newsletter-input{flex:1;min-width:220px;padding:.9rem 1.25rem;border-radius:40px;border:2px solid rgba(249,168,201,.5);background:var(--white);font-family:'Nunito',sans-serif;font-size:.95rem;color:var(--text);outline:none;transition:border-color .2s}
    .newsletter-input:focus{border-color:var(--pink-deep)}
    .btn-newsletter{background:var(--pink-deep);color:#fff;border:none;padding:.9rem 2rem;border-radius:40px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.95rem;cursor:pointer;transition:background .2s,transform .15s;white-space:nowrap}
    .btn-newsletter:hover{background:var(--brown-mid);transform:translateY(-2px)}
    .newsletter-note{font-size:.78rem;color:var(--text-light);margin-top:.75rem}
    .newsletter-success{display:none;background:rgba(39,174,96,.12);border:1.5px solid rgba(39,174,96,.3);color:#1e7e44;border-radius:16px;padding:1rem 1.5rem;font-weight:700;font-size:.95rem;margin-top:1rem}
    
    /* CONTACT */
    #contact{background:var(--white)}
    .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:start}
    .info-cards{display:flex;flex-direction:column;gap:1rem}
    .info-card{background:var(--cream2);border-radius:16px;padding:1.25rem 1.5rem;border:1.5px solid rgba(249,168,201,.3);display:flex;align-items:flex-start;gap:1rem}
    .info-icon{font-size:1.8rem;flex-shrink:0}
    .info-label{font-weight:800;font-size:.8rem;color:var(--text-light);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.2rem}
    .info-val{font-weight:700;font-size:1rem;color:var(--brown)}
    .info-val a{color:var(--pink-deep);text-decoration:none}
    .hours-grid{display:grid;grid-template-columns:auto 1fr;gap:.3rem 1.5rem;font-size:.9rem}
    .hours-day{font-weight:700;color:var(--brown)}
    .hours-time{color:var(--text-mid)}
    .hours-closed{color:var(--text-light);font-style:italic}
    .map-wrap{border-radius:20px;overflow:hidden;border:2px solid rgba(249,168,201,.4);aspect-ratio:4/3}
    .map-wrap iframe{width:100%;height:100%;border:none}
    .call-cta{display:flex;align-items:center;justify-content:center;gap:.75rem;background:var(--yellow-dark);color:var(--brown);padding:1.1rem 2rem;border-radius:16px;font-family:'Nunito',sans-serif;font-weight:800;font-size:1.1rem;text-decoration:none;transition:background .2s,transform .15s;margin-top:.5rem}
    .call-cta:hover{background:var(--yellow);transform:translateY(-2px)}
    
    /* ANNOUNCEMENT */
    #announcement-bar{background:var(--yellow-dark);color:var(--brown);text-align:center;padding:.55rem 1rem;font-weight:800;font-size:.9rem;display:none}
    #announcement-bar.visible{display:block}
    nav.has-banner{top:2.4rem}
    #specials-section{display:none;background:var(--yellow);padding:2rem}
    #specials-section.visible{display:block}
    .specials-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap}
    .specials-label{font-size:.75rem;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:var(--brown-mid);margin-bottom:.2rem}
    .specials-title{font-family:'Fredoka One',cursive;font-size:1.6rem;color:var(--brown)}
    .specials-desc{font-size:.95rem;color:var(--brown-mid)}
    
    /* FOOTER */
    footer{background:var(--brown);color:rgba(255,248,240,.8);padding:2.5rem 2rem;text-align:center}
    .footer-brand{font-family:'Fredoka One',cursive;font-size:1.8rem;color:var(--yellow);margin-bottom:.5rem}
    .footer-links{display:flex;justify-content:center;gap:1.5rem;margin-bottom:.75rem;flex-wrap:wrap}
    .footer-links a{color:rgba(255,255,255,.5);text-decoration:none;font-size:.85rem;font-weight:700;transition:color .2s}
    .footer-links a:hover{color:var(--yellow)}
    .footer-addr{font-size:.88rem;margin-bottom:.3rem}
    .footer-copy{font-size:.78rem;opacity:.5;margin-top:1rem}
    
    /* ANIMATIONS */
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes wobble{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
    @keyframes bounce2{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-8px)}}
    @keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:0}10%{opacity:.7}90%{opacity:.7}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
    
    /* REVEAL */
    .reveal{opacity:0;transform:translateY(32px);transition:opacity 0.6s ease,transform 0.6s ease}
    .reveal.visible{opacity:1;transform:translateY(0)}
    
    /* BACK TO TOP */
    #back-to-top{position:fixed;bottom:2rem;right:2rem;z-index:500;width:48px;height:48px;border-radius:50%;background:var(--pink-deep);color:#fff;border:none;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(194,24,91,0.35);opacity:0;transform:translateY(12px);transition:opacity 0.3s,transform 0.3s,background 0.2s;pointer-events:none}
    #back-to-top.visible{opacity:1;transform:translateY(0);pointer-events:all}
    #back-to-top:hover{background:var(--brown-mid)}
    
    /* MOBILE STICKY CTA */
    .mobile-sticky-cta{display:none;position:fixed;bottom:0;left:0;right:0;z-index:1000;background:var(--cream);border-top:2px solid rgba(249,168,201,0.5);padding:0.75rem 1rem;padding-bottom:calc(0.75rem + env(safe-area-inset-bottom));box-shadow:0 -4px 20px rgba(0,0,0,0.1);gap:0.75rem;justify-content:center;align-items:center}
    .mobile-sticky-cta .btn-pink,.mobile-sticky-cta .btn-ghost{flex:1;max-width:160px;padding:0.75rem 1rem;font-size:0.9rem;text-align:center}
    
    /* RESPONSIVE */
    @media(max-width:768px){
      .nav-links{display:none}
      nav{padding:.75rem 1.25rem}
      .nav-name{font-size:1.15rem}
      .nav-order{font-size:.78rem;padding:.45rem 1rem}
      #hero{padding:6rem 1.5rem 3.5rem}
      .hero-title{font-size:clamp(3rem,11vw,5rem)}
      section{padding:4rem 1.5rem}
      .special-inner,.about-grid,.contact-grid,.catering-inner{grid-template-columns:1fr;gap:2rem}
      .catering-visual{display:none}
      .menu-grid{grid-template-columns:1fr 1fr;gap:1rem}
      .why-grid{grid-template-columns:1fr 1fr;gap:1rem}
      .reviews-grid{grid-template-columns:1fr}
      .map-wrap{aspect-ratio:16/9}
    }
    @media(max-width:480px){
      .nav-call{display:none}
      nav{padding:.65rem 1rem}
      .nav-donut{font-size:1.4rem}
      .nav-name{font-size:1rem}
      .nav-order{font-size:.75rem;padding:.4rem .85rem;white-space:nowrap}
      #hero{padding:5.5rem 1rem 3rem}
      #sprinkles{display:none}
      .hero-badge{font-size:.7rem;padding:.3rem .9rem}

// ============================================
// DATA LOADING
// ============================================
let siteData = null;

function loadData() {
  // Try to load from localStorage first
  const saved = localStorage.getItem('yummys_site_data');
  if (saved) {
    try {
      siteData = JSON.parse(saved);
      // Merge with defaults to ensure all fields exist
      siteData = deepMerge(DEFAULT_DATA, siteData);
    } catch (e) {
      siteData = JSON.parse(JSON.stringify(DEFAULT_DATA));
    }
  } else {
    siteData = JSON.parse(JSON.stringify(DEFAULT_DATA));
  }
}

function deepMerge(defaults, saved) {
  const result = JSON.parse(JSON.stringify(defaults));
  for (const key in saved) {
    if (saved[key] !== null && typeof saved[key] === 'object' && !Array.isArray(saved[key])) {
      result[key] = deepMerge(result[key] || {}, saved[key]);
    } else {
      result[key] = saved[key];
    }
  }
  return result;
}

// ============================================

function renderVisibility() {
  const v = siteData.visibility;
  setVisibility('announcement-bar', v.announcement);
  setVisibility('specials-section', v.specialsStrip);
  setVisibility('hero', v.hero);
  setVisibility('stats-ribbon', v.stats);
  setVisibility('monthly-special', v.monthlySpecial);
  setVisibility('menu', v.menu);
  setVisibility('why-us', v.whyUs);
  setVisibility('about', v.about);
  setVisibility('catering', v.catering);
  setVisibility('reviews', v.reviews);
  setVisibility('newsletter', v.newsletter);
  setVisibility('contact', v.contact);
  setVisibility('footer', v.footer);

    document.getElementById('main-nav').classList.add('has-banner');

}

function setVisibility(id, visible) {

// ============================================
// INTERACTIVE FUNCTIONS
// ============================================
function showTab(id, btn) {
  document.querySelectorAll('.menu-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
}

function subscribeNewsletter() {
  const email = document.getElementById('newsletter-email').value.trim();
  if (!email || !email.includes('@')) {
    document.getElementById('newsletter-email').style.borderColor = '#e74c3c';
    setTimeout(() => document.getElementById('newsletter-email').style.borderColor = '', 2000);
    return;
  }
  document.querySelector('.newsletter-form').style.display = 'none';
  document.getElementById('newsletter-success').style.display = 'block';
}

function setupSprinkles() {
  const colors = ['#F9A8C9', '#FFD966', '#5EC8F2', '#A78BFA', '#F87171', '#34D399'];
  const container = document.getElementById('sprinkles');
  if (!container) return;
  for (let i = 0; i < 30; i++) {
    const s = document.createElement('div');
    s.className = 'sprinkle';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.background = colors[Math.floor(Math.random() * colors.length)];
    s.style.transform = 'rotate(' + Math.random() * 360 + 'deg)';
    s.style.animationDuration = (8 + Math.random() * 12) + 's';
    s.style.animationDelay = (-Math.random() * 12) + 's';
    container.appendChild(s);
  }
}

function initReveal() {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.12 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
}

// Back to top button
window.addEventListener('scroll', () => {
  const btn = document.getElementById('back-to-top');
  if (btn) btn.classList.toggle('visible', window.scrollY > 400);
}, { passive: true });

renderAll();
</script>
